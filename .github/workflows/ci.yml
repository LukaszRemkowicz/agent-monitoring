name: CI

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    environment: test
    env:
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pre-commit
        env:
          SKIP: pytest-pre-commit
        run: uv run pre-commit run --all-files

  tests:
    uses: LukaszRemkowicz/ci-cd/.github/workflows/python-tests-uv.yml@main
    with:
      working_directory: .
      postgres_enabled: true
      postgres_db: agent_monitoring_test
      postgres_user: agent_monitoring
      postgres_password: agent-monitoring-local-password
      postgres_port: "5432"
      test_environment: |
        DATABASE_HOST=localhost
        DATABASE_PORT=5432
        DATABASE_NAME=agent_monitoring_test
        DATABASE_USER=agent_monitoring
        DATABASE_PASSWORD=agent-monitoring-local-password

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [quality, tests]
    env:
      ENVIRONMENT: prod
      TAG: v0.0.0-ci
      DATABASE_NAME: agent_monitoring
      DATABASE_USER: agent_monitoring
      DATABASE_PASSWORD: agent-monitoring-local-password
      LOG_ANALYSIS_MCP_URL: http://mcp-log-server:8000/mcp
      MCP_WORKFLOW_JWT: ci-token
      EMAIL_HOST: localhost
      EMAIL_FROM: monitoring@example.com
      EMAIL_TO: ops@example.com
      SITEMAP_PUBLIC_HOST: https://example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate local compose config
        run: docker compose config

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config

      - name: Build Docker image
        run: docker compose build monitoring-app

  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: LukaszRemkowicz/ci-cd/.github/workflows/codeql.yml@main
    with:
      languages_json: '["python"]'

  version-check:
    uses: LukaszRemkowicz/ci-cd/.github/workflows/version-check.yml@main
    with:
      base_branch: main
      head_branch: dev

  pr-status:
    needs: [quality, tests, docker-build, codeql, version-check]
    if: always()
    uses: LukaszRemkowicz/ci-cd/.github/workflows/pr-status.yml@main
    with:
      status_items_json: >-
        {"Quality":"${{ needs.quality.result }}","Tests":"${{ needs.tests.result }}","Docker Build Check":"${{ needs.docker-build.result }}","CodeQL":"${{ needs.codeql.result }}","Version Check":"${{ needs.version-check.result }}"}
      success_message: All agent-monitoring CI checks passed.
      failure_message: Agent-monitoring CI failed. Please review the workflow logs.

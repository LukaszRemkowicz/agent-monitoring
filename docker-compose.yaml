services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${DATABASE_PORT_HOST:-5438}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - monitoring-db:/var/lib/postgresql

  monitoring-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./private:/app/private:ro
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      TZ: Europe/Warsaw
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "${DATABASE_PORT_HOST:-5438}"
      DATABASE_NAME: monitoring
      DATABASE_USER: monitoring
      DATABASE_PASSWORD: monitoring
      DEBUG: "true"
      LOG_COLOR: always
      MONITORING_AUTO_MIGRATE: "true"
      LOG_ANALYSIS_MCP_URL: ${LOG_ANALYSIS_MCP_URL:-http://127.0.0.1:8001/mcp}
      MONITORING_PROJECT: landingpage
      MCP_WORKFLOW_JWT: ${MCP_WORKFLOW_JWT:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-smtp}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
      SITE_DOMAIN: ${SITE_DOMAIN:-}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-}
      SITEMAP_EMAIL_TO: ${SITEMAP_EMAIL_TO:-}
    command: ["log_analysis"]

volumes:
  monitoring-db:

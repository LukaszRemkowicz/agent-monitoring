services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${DATABASE_PORT_HOST:-5438}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - monitoring-db:/var/lib/postgresql

  monitoring-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./private:/app/private:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    network_mode: host
    environment:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "${DATABASE_PORT_HOST:-5438}"
      DATABASE_NAME: monitoring
      DATABASE_USER: monitoring
      DATABASE_PASSWORD: monitoring
      DEBUG: "true"
      LOG_COLOR: always
      LOG_ANALYSIS_MCP_URL: ${LOG_ANALYSIS_MCP_URL:-http://127.0.0.1:8001/mcp}
      MONITORING_PROJECT: landingpage
      MCP_WORKFLOW_JWT: ${MCP_WORKFLOW_JWT}
      SITE_DOMAIN: ${SITE_DOMAIN:-}
    command: ["log_analysis"]

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./private:/app/private:ro
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    environment:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "${DATABASE_PORT_HOST:-5438}"
      DATABASE_NAME: monitoring
      DATABASE_USER: monitoring
      DATABASE_PASSWORD: monitoring
      DEBUG: "true"
      LOG_COLOR: always
      LOG_ANALYSIS_MCP_URL: ${LOG_ANALYSIS_MCP_URL:-http://127.0.0.1:8001/mcp}
      MONITORING_PROJECT: landingpage
      MCP_WORKFLOW_JWT: ${MCP_WORKFLOW_JWT}
      SITE_DOMAIN: ${SITE_DOMAIN:-}
    command: ["migrate"]

volumes:
  monitoring-db:

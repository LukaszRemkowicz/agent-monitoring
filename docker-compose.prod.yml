services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${POSTGRES_DATA_DIR:-/var/lib/agent-monitoring/postgresql}:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: prod-agent-monitoring:${TAG:?TAG is required}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: prod
      PYTHONPATH: /app/src
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:?DATABASE_NAME is required}
      DATABASE_USER: ${DATABASE_USER:?DATABASE_USER is required}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      LOG_ANALYSIS_MCP_URL: ${LOG_ANALYSIS_MCP_URL:?LOG_ANALYSIS_MCP_URL is required}
      MCP_WORKFLOW_JWT: ${MCP_WORKFLOW_JWT:?MCP_WORKFLOW_JWT is required}
      MONITORING_PROJECT: ${MONITORING_PROJECT:-landingpage}
      EMAIL_HOST: ${EMAIL_HOST:?EMAIL_HOST is required}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
      EMAIL_TO: ${EMAIL_TO:?EMAIL_TO is required}
      SITEMAP_ROOT_URL: ${SITEMAP_ROOT_URL:-}
      SITEMAP_EMAIL_TO: ${SITEMAP_EMAIL_TO:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
    volumes:
      - ${MONITORING_PRIVATE_CONTEXT_DIR:-./private}:/app/private:ro
    command: ["log_analysis"]
